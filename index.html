<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>長榮航空 - 系統導航中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="cloud-layer"></div>

    <div class="container">
        <div class="plane-wrapper">✈️</div>
        <h1>請稍候，我們正在為您導航</h1>
        <p id="message">目前訂位人潮踴躍，機長正在努力排解塔台流量限制，請您留在網頁上，我們將盡快帶您進入預訂流程。</p>
        
        <div class="progress-container">
            <div class="progress-bar" id="bar"></div>
        </div>
        <div class="status-text" id="status">正在檢查客艙空間...</div>

        <p class="footer-note">提示：請勿重新整理頁面，以免遺失您的排隊順序。</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
